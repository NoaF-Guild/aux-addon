name: Release

on:
  push:
    branches:
      - master
    tags:
      - 'v*'

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Extract version from TOC
        id: toc
        run: |
          VERSION=$(grep '^## Version:' Aux-addon.toc | sed 's/.*: *//')
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "TOC version: $VERSION"

      - name: Build addon zip
        run: |
          git archive --prefix=Aux-addon/ -o Aux-addon.zip HEAD

      - name: Create stable release (tag)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          name: Aux-addon ${{ steps.toc.outputs.version }}
          files: Aux-addon.zip
          generate_release_notes: true

      - name: Create rolling pre-release (master)
        if: github.ref == 'refs/heads/master'
        uses: softprops/action-gh-release@v2
        with:
          name: Aux-addon Latest (${{ steps.toc.outputs.version }})
          tag_name: latest
          prerelease: true
          files: Aux-addon.zip
          generate_release_notes: true
